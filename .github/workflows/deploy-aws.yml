name: Deploy to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-2
  EB_APPLICATION: balentinetech-backend
  EB_ENVIRONMENT: Balentinetech-backend-env
  DOCKERHUB_USERNAME: debalent

jobs:
  # ── 1. TEST ───────────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Verify server starts
        working-directory: backend
        run: |
          timeout 10 node -e "
            process.env.EMAIL_USER='test@example.com';
            process.env.EMAIL_PASS='test';
            const app = require('./server.js');
          " || exit_code=$?
          # Exit code 124 means timeout (server stayed up — that's a pass)
          if [ "${exit_code}" = "124" ] || [ -z "${exit_code}" ]; then
            echo "Server started successfully"
          else
            echo "Server failed to start (exit $exit_code)"
            exit 1
          fi

  # ── 2. BUILD & PUSH DOCKER IMAGES ────────────────────────
  build-images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Frontend image (multi-stage: Vite build → nginx serve on port 3000) ──
      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=http://${{ secrets.EC2_HOST }}:3001
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/balentinetech-frontend:latest
            ${{ env.DOCKERHUB_USERNAME }}/balentinetech-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Backend image (Node.js Express API) ──
      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/balentinetech-backend:latest
            ${{ env.DOCKERHUB_USERNAME }}/balentinetech-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. DEPLOY FRONTEND TO S3 ─────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to S3
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build React app for production
        working-directory: frontend
        env:
          VITE_API_URL: http://${{ secrets.EC2_HOST }}:3001
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync built React app (dist/) to S3
        run: |
          aws s3 sync frontend/dist s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --exclude "Dockerfile" \
            --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  # ── 4. DEPLOY BACKEND TO ELASTIC BEANSTALK ───────────────
  deploy-backend:
    name: Deploy Backend to Elastic Beanstalk
    runs-on: ubuntu-latest
    needs: build-images
    outputs:
      previous-version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Save current EB version for rollback
        id: get-version
        run: |
          CURRENT=$(aws elasticbeanstalk describe-environments \
            --environment-names ${{ env.EB_ENVIRONMENT }} \
            --query "Environments[0].VersionLabel" \
            --output text)
          echo "version=$CURRENT" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT"

      # Use the Docker Hub image tag via Dockerrun.aws.json
      - name: Stamp SHA into Dockerrun.aws.json
        run: |
          sed -i "s|:latest|:${{ github.sha }}|g" backend/Dockerrun.aws.json

      - name: Package backend deployment artifact
        run: |
          cd backend
          zip -r ../backend-deploy-${{ github.sha }}.zip \
            Dockerfile server.js package.json .dockerignore Dockerrun.aws.json
          cd ..
          echo "Package size: $(du -sh backend-deploy-${{ github.sha }}.zip)"

      - name: Upload artifact to S3
        run: |
          aws s3 cp backend-deploy-${{ github.sha }}.zip \
            s3://${{ secrets.S3_BUCKET_NAME }}/deployments/backend-deploy-${{ github.sha }}.zip

      - name: Create new Elastic Beanstalk application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name ${{ env.EB_APPLICATION }} \
            --version-label "deploy-${{ github.sha }}" \
            --source-bundle S3Bucket="${{ secrets.S3_BUCKET_NAME }}",S3Key="deployments/backend-deploy-${{ github.sha }}.zip" \
            --description "GitHub Actions - ${{ github.sha }}" \
          || echo "Version already exists, proceeding with deploy"

      - name: Deploy new version to environment
        run: |
          aws elasticbeanstalk update-environment \
            --application-name ${{ env.EB_APPLICATION }} \
            --environment-name ${{ env.EB_ENVIRONMENT }} \
            --version-label "deploy-${{ github.sha }}"

      - name: Wait for deployment to complete
        run: |
          echo "Polling for environment status..."
          for i in $(seq 1 30); do
            STATUS=$(aws elasticbeanstalk describe-environments \
              --environment-names ${{ env.EB_ENVIRONMENT }} \
              --query "Environments[0].Status" \
              --output text)
            echo "  Attempt $i/30 — Status: $STATUS"
            if [ "$STATUS" = "Ready" ]; then
              echo "Deployment complete."
              break
            fi
            if [ "$i" = "30" ]; then
              echo "Timed out waiting for deployment."
              exit 1
            fi
            sleep 30
          done

      - name: Verify environment health
        run: |
          HEALTH=$(aws elasticbeanstalk describe-environments \
            --environment-names ${{ env.EB_ENVIRONMENT }} \
            --query "Environments[0].Health" \
            --output text)
          echo "Environment health: $HEALTH"
          if [ "$HEALTH" != "Green" ]; then
            echo "Health check failed — triggering rollback."
            exit 1
          fi

  # ── 5. ROLLBACK IF BACKEND DEPLOYMENT FAILS ──────────────
  rollback:
    name: Rollback Backend on Failure
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: needs.deploy-backend.result == 'failure'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Roll back to previous version
        run: |
          PREVIOUS="${{ needs.deploy-backend.outputs.previous-version }}"
          echo "Rolling back to: $PREVIOUS"
          aws elasticbeanstalk update-environment \
            --application-name ${{ env.EB_APPLICATION }} \
            --environment-name ${{ env.EB_ENVIRONMENT }} \
            --version-label "$PREVIOUS"

      - name: Wait for rollback to complete
        run: |
          for i in $(seq 1 20); do
            STATUS=$(aws elasticbeanstalk describe-environments \
              --environment-names ${{ env.EB_ENVIRONMENT }} \
              --query "Environments[0].Status" \
              --output text)
            echo "  Attempt $i/20 — Status: $STATUS"
            if [ "$STATUS" = "Ready" ]; then
              echo "Rollback complete."
              break
            fi
            sleep 30
          done

      - name: Notify rollback via SNS (optional)
        run: |
          aws sns publish \
            --topic-arn ${{ secrets.SNS_ALERT_TOPIC_ARN }} \
            --message "ROLLBACK triggered for deploy ${{ github.sha }} on branch ${{ github.ref_name }}" \
            --subject "BalentineTech Deploy Rollback" \
          || echo "SNS publish skipped (topic ARN not configured)"
